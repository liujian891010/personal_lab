<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Center + LLM Wiki</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-mode">
    <div class="app-shell auth-mode">
      <header class="topbar" hidden>
        <div class="brand-block">
          <a class="brand-link" href="#/reports">Report Center</a>
          <p class="brand-copy">Reports, Wiki, Query, Governance</p>
        </div>
        <nav class="main-nav">
          <a data-section="uploads" href="#/uploads">Uploads</a>
          <a data-section="reports" href="#/reports">Reports</a>
          <a data-section="wiki" href="#/wiki">Wiki</a>
          <a data-section="ask" href="#/ask">Ask</a>
          <a data-section="tasks" href="#/tasks">Tasks</a>
          <a data-section="conflicts" href="#/conflicts">Conflicts</a>
          <a data-section="admin" href="#/admin">Admin</a>
        </nav>
        <div class="topbar-status">
          <div class="session-slot" id="session-slot"></div>
          <div class="health-pill" id="health-pill">API Pending</div>
        </div>
      </header>

      <main id="app" class="view-shell"></main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
