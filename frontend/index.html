<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Center + LLM Wiki</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <a class="brand-link" href="#/reports">Report Center</a>
          <p class="brand-copy">Reports, Wiki, Query, Governance</p>
        </div>
        <nav class="main-nav">
          <a data-section="uploads" href="#/uploads">Uploads</a>
          <a data-section="reports" href="#/reports">Reports</a>
          <a data-section="wiki" href="#/wiki">Wiki</a>
          <a data-section="ask" href="#/ask">Ask</a>
          <a data-section="tasks" href="#/tasks">Tasks</a>
          <a data-section="conflicts" href="#/conflicts">Conflicts</a>
          <a data-section="admin" href="#/admin">Admin</a>
        </nav>
        <div class="health-pill" id="health-pill">API Pending</div>
      </header>

      <section class="masthead">
        <div>
          <p class="eyebrow">Phase 8 Workspace</p>
          <h1>从报告沉淀到知识治理的同源工作台</h1>
          <p class="masthead-copy">
            直接挂在 FastAPI 上，围绕报告、Wiki、问答、任务、冲突和运维动作形成一条可操作的闭环。
          </p>
        </div>
        <div class="masthead-aside">
          <div class="signal-card">
            <span class="signal-label">App Entry</span>
            <strong>/app/</strong>
          </div>
          <div class="signal-card">
            <span class="signal-label">API Base</span>
            <strong>/api/*</strong>
          </div>
        </div>
      </section>

      <main id="app" class="view-shell"></main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
